<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony Fraignaud — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-identity">
        <img
          src="https://github.com/afraigna.png"
          alt="Avatar de afraigna"
          class="avatar"
          width="56"
          height="56"
        />
        <div>
          <h1 class="site-title">afraigna</h1>
          <p class="site-subtitle">Projets &amp; expérimentations</p>
        </div>
      </div>
      <a
        href="https://github.com/afraigna"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-outline"
        aria-label="Profil GitHub"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <main class="main-content">
    <div id="status" class="status" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      Chargement des projets…
    </div>
    <div id="projects-grid" class="projects-grid" aria-label="Liste des projets"></div>
  </main>

  <footer class="site-footer">
    <p>Données chargées en direct depuis <a href="https://github.com/afraigna" target="_blank" rel="noopener noreferrer">github.com/afraigna</a></p>
  </footer>

  <!-- Modale README -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Fermer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal-header">
        <h2 id="modal-title" class="modal-repo-name"></h2>
        <div id="modal-lang-bar" class="lang-bar"></div>
      </div>
      <div id="modal-body" class="modal-body markdown-body">
        <div class="modal-loading">
          <span class="spinner" aria-hidden="true"></span> Chargement du README…
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
